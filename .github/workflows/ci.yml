name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Core (scistudio) is private and not on PyPI. CI installs it from the
  # private GitHub repo. Add a repository secret SCISTUDIO_CORE_TOKEN — a PAT
  # (classic: `repo` scope, or fine-grained: read access to the core repo).
  # When core is published to PyPI, delete the "Install SciStudio core" steps
  # and let pip resolve `scistudio` from the dependency floor.
  SCISTUDIO_CORE_REPO: jiazhenz026/SciStudio
  SCISTUDIO_CORE_REF: main

jobs:
  quality:
    # Keep this display name matching the "Rules for Agents" ruleset's required
    # status check context ("Lint · Type · Test · Contract (3.x)"). The job also
    # runs the freeze + docs steps below; renaming the check would orphan the
    # required context and block merges. Update the ruleset before renaming.
    name: Lint · Type · Test · Contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SciStudio core (private)
        run: |
          python -m pip install --upgrade pip
          pip install "scistudio @ git+https://x-access-token:${SCISTUDIO_CORE_TOKEN}@github.com/${SCISTUDIO_CORE_REPO}.git@${SCISTUDIO_CORE_REF}"
        env:
          SCISTUDIO_CORE_TOKEN: ${{ secrets.SCISTUDIO_CORE_TOKEN }}

      - name: Install package (dev + docs extras)
        run: pip install -e ".[dev,docs]"

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      # mypy targets python_version 3.11 (matches SciStudio core). Run it only
      # on the 3.11 leg: under 3.12 the installed numpy stubs use PEP 695 `type`
      # statements that a 3.11 target cannot parse.
      - name: Mypy
        if: matrix.python-version == '3.11'
        run: mypy src

      - name: Pytest
        run: pytest

      - name: Validate SciStudio contract
        run: python scripts/validate_contract.py

      # ADR-052 §15: the public API surface must match the committed snapshot.
      # An accidental add/remove/re-tier fails here; an intentional change
      # regenerates the snapshot (owner-reviewed via CODEOWNERS on tests/api/**).
      - name: Verify API surface freeze
        run: python scripts/snapshot_api.py

      # ADR-052 §7: the generated API reference must build (parity with core).
      # One leg only — griffe output does not vary by interpreter.
      - name: Build API reference (mkdocs)
        if: matrix.python-version == '3.12'
        run: mkdocs build --strict

  build-wheel:
    name: Build .whl
    # Independent of `quality`: the wheel build needs neither core nor the
    # token, so it always runs and reports on its own rather than being skipped
    # when a quality leg fails.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The wheel build does not need core: build isolation only installs the
      # build backend (hatchling), and runtime deps are recorded, not resolved.
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-dist
          path: dist/*
          if-no-files-found: error

  publish-wheel:
    name: Publish wheel release (v<version>)
    needs: build-wheel
    # Version-driven GitHub Release. On every push to `main` the built wheel +
    # sdist are published to a release tagged from the `pyproject.toml` version
    # (e.g. v0.1.0). Bumping the version creates a new release; re-merging the
    # same version refreshes that release's assets. Pull requests and other
    # branches only build the artifact (above) and never publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-dist
          path: dist

      - name: Resolve version tag
        id: ver
        run: |
          version=$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Publish wheel + sdist to the version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag='${{ steps.ver.outputs.tag }}'
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; refreshing its assets."
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes "Automated wheel build for ${tag}. Install the attached wheel via the SciStudio in-app Package Manager (local install) or \`pip install\`." \
              --latest
          fi
          gh release upload "$tag" dist/* --clobber
